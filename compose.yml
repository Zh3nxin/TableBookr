services:
  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tablebookr
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - tablebookr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tablebookr"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  tablebookr_postgres_data:
